<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">APP Ventas</span>

            <div class="d-flex align-items-center">
                <span id="usuarioActivo" class="text-white me-3"></span>
                <button class="btn btn-danger" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container my-5">

        <h2 class="text-center mb-4">Menú Principal</h2>

        <div class="row g-4">

            <!-- DASHBOARD -->
            <div class="col-12 col-md-4">
                <div class="card shadow h-100 text-center p-3">
                    <h5>Dashboard</h5>
                    <p>Visualiza estadísticas y resumen de ventas</p>
                    <button class="btn btn-primary" onclick="irDashboard()">Entrar</button>
                </div>
            </div>

            <!-- PRODUCTOS -->
            <div class="col-12 col-md-4">
                <div class="card shadow h-100 text-center p-3">
                    <h5>Productos</h5>
                    <p>Gestiona tus jeans y catálogo</p>
                    <button class="btn btn-success">Ver productos</button>
                </div>
            </div>

            <!-- VENTAS -->
            <div class="col-12 col-md-4">
                <div class="card shadow h-100 text-center p-3">
                    <h5>Ventas</h5>
                    <p>Consulta historial de ventas</p>
                    <button class="btn btn-warning">Ver ventas</button>
                </div>
            </div>

        </div>

    </main>

    <!-- 🔥 SCRIPT CORREGIDO -->
    <script>
        // ✅ MISMO NOMBRE QUE USASTE EN EL LOGIN
        const usuario = localStorage.getItem("user");

        // 🔒 PROTEGER ACCESO
        if (!usuario) {
            window.location.href = "../index.html";
        } else {
            document.getElementById("usuarioActivo").textContent = "👤 " + usuario;
        }

        function irDashboard() {
            window.location.href = "dashboard.html";
        }

        function cerrarSesion() {
            localStorage.removeItem("user");
            window.location.href = "../index.html";
        }
    </script>

</body>
</html>
