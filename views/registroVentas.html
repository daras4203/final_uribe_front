<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/styles.css">
</head>

<body>

    <header></header>

    <main>
        <section class="banner">

        </section>
        <section class="container my-5">
            <section class="row justify-content-center">
                <section class="col-12 col-md-8">
                    <h2>TIENDA CHEVIGNION</h2>
                    <h3>Registro de ventas en la sucursal San Diego</h3>
                    <hr>
                    <form class="p-5 border rounded shadow">

                        <select class="form-select mb-3">
                            <option>Seleccione un vendedor</option>
                            <option value="1">Leo Messi</option>
                            <option value="2">Cristiano Ronaldo</option>
                            <option value="3">Neymar Jr</option>
                            <option value="4">Kylian Mbappé</option>
                            <option value="5">Kevin De Bruyne</option>
                            <option value="6">Mohamed Salah</option>
                            <option value="7">Virgil van Dijk</option>
                            <option value="8">Sadio Mané</option>
                            <option value="9">Eden Hazard</option>
                        </select>

                        <div class="row">
                            <div class="col-6">
                                <input type="date" class="form-control mb-3">
                            </div>
                            <div class="col-6">
                                <input type="text" placeholder="centro comercial (LOCAL)" class="form-control mb-3">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <div class="form-floating">
                                    <textarea class="form-control" placeholder="Productos de la compra"
                                        id="floatingTextarea"></textarea>
                                    <label for="floatingTextarea">Productos</label>
                                </div>
                            </div>
                            <div class="col-6 aliine-self-center">
                                <input type="number" placeholder="Costo Total" class="form-control mb-3">
                            </div>
                            
                        </div>

                        <button type="submit" class="btn btn-primary w-100 m-3">Registrar venta</button>

                        <a href="/index.html">Volver al inicio</a>

                    </form>
                </section>
            </section>
        </section>
    </main>

    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
